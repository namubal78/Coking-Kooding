name: Dev Log

on:
  push:
    branches: [main]

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Render deploy to complete
        run: sleep 300

      - name: Send commit to dev log
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          AUTHOR=$(git log -1 --pretty=%an)
          SHA=$(git log -1 --pretty=%H | cut -c1-7)
          TIMESTAMP=$(git log -1 --pretty=%cI)
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | jq -Rs 'split("\n") | map(select(length > 0))')

          curl -s -X POST "${{ secrets.API_URL }}/api/dev-logs/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"commitMessage\":$(echo "$COMMIT_MSG" | jq -Rs .),\"author\":$(echo "$AUTHOR" | jq -Rs .),\"sha\":$(echo "$SHA" | jq -Rs .),\"changedFiles\":$FILES,\"timestamp\":$(echo "$TIMESTAMP" | jq -Rs .)}"

      - name: Slack 배포 알림
        if: ${{ secrets.SLACK_BOT_TOKEN != '' }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          SHA=$(git log -1 --pretty=%H | cut -c1-7)
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"${{ secrets.SLACK_CHANNEL_ID }}\",\"text\":\"✅ 배포 완료 [\`$SHA\`] $COMMIT_MSG\"}"
