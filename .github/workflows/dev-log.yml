name: Dev Log

on:
  push:
    branches: [main]

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Render deploy to complete
        run: sleep 300

      - name: Send commit to dev log
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          AUTHOR=$(git log -1 --pretty=%an)
          SHA=$(git log -1 --pretty=%H | cut -c1-7)
          TIMESTAMP=$(git log -1 --pretty=%cI)
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | jq -Rs 'split("\n") | map(select(length > 0))')

          curl -s -X POST "${{ secrets.API_URL }}/api/dev-logs/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"commitMessage\":$(echo "$COMMIT_MSG" | jq -Rs .),\"author\":$(echo "$AUTHOR" | jq -Rs .),\"sha\":$(echo "$SHA" | jq -Rs .),\"changedFiles\":$FILES,\"timestamp\":$(echo "$TIMESTAMP" | jq -Rs .)}"

      - name: Slack 배포 알림
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          echo "TOKEN_SET=$([ -n "$SLACK_BOT_TOKEN" ] && echo YES || echo NO)"
          echo "CHANNEL=$SLACK_CHANNEL_ID"
          if [ -z "$SLACK_BOT_TOKEN" ]; then echo "토큰 없음, 스킵"; exit 0; fi
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          SHA=$(git log -1 --pretty=%H | cut -c1-7)
          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL_ID\",\"text\":\"✅ 배포 완료 [\`$SHA\`] $(echo "$COMMIT_MSG" | jq -Rs .)\"}")
          echo "SLACK_RESPONSE=$RESPONSE"
