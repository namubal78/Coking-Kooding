spring:
  main:
    lazy-initialization: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email,profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname,account_email
            client-name: Kakao
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cookingcooding}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 1800000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      connection-timeout: 60000
      initialization-fail-timeout: 180000
      data-source-properties:
        connectTimeout: 60
        socketTimeout: 60
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:coking-cooding-secret-key-must-be-at-least-256-bits-long}
  expiration: 315360000000  # 10년 (사실상 만료 없음)

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

family:
  emails: ${FAMILY_EMAILS:}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
  bucket: ${SUPABASE_BUCKET:photos}

webhook:
  secret: ${WEBHOOK_SECRET:}

slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  signing-secret: ${SLACK_SIGNING_SECRET:}
  channel-id: ${SLACK_CHANNEL_ID:}

# 알림 수신 대상 (이메일 콤마 구분, 전화번호 하이픈 없이)
