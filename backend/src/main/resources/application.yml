spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cookingkooding}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:coking-kooding-secret-key-must-be-at-least-256-bits-long}
  expiration: 86400000  # 24시간

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
